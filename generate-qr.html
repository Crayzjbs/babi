<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate QR Code</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #F5EFE0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        
        h1 {
            color: #C07B6A;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        p {
            color: #1C1A17;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #C07B6A;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            background: #C07B6A;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #A66959;
            transform: scale(1.05);
        }
        
        #qrcode {
            margin: 30px auto;
            padding: 20px;
            background: white;
            display: inline-block;
            border-radius: 10px;
        }
        
        .success {
            color: #4CAF50;
            font-weight: bold;
            margin-top: 20px;
        }
        
        canvas {
            border: 3px solid #C07B6A;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💌 Love Letter QR Code Generator</h1>
        <p>Enter your Vercel deployment URL to generate a QR code</p>
        
        <input 
            type="text" 
            id="urlInput" 
            placeholder="https://babi.vercel.app or your custom URL"
            value="https://babi.vercel.app"
        />
        
        <button onclick="generateAndDownload()">Generate & Download QR Code</button>
        
        <div id="qrcode"></div>
        <div id="message"></div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        function generateAndDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const messageDiv = document.getElementById('message');
            
            if (!url) {
                alert('Please enter your Vercel URL');
                return;
            }
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('Please enter a valid URL starting with http:// or https://');
                return;
            }
            
            // Clear previous QR code
            document.getElementById('qrcode').innerHTML = '';
            messageDiv.innerHTML = '';
            
            // Generate QR code
            const qrcode = new QRCode(document.getElementById('qrcode'), {
                text: url,
                width: 512,
                height: 512,
                colorDark: '#1C1A17',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            // Wait for QR code to render, then download
            setTimeout(() => {
                const canvas = document.querySelector('#qrcode canvas');
                if (canvas) {
                    // Convert canvas to blob and download
                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'love-letter-qr-code.png';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        
                        messageDiv.innerHTML = '<p class="success">✅ QR Code downloaded successfully!<br>Check your Downloads folder for "love-letter-qr-code.png"</p>';
                    });
                }
            }, 500);
        }
        
        // Auto-generate on page load if default URL is present
        window.addEventListener('load', () => {
            const urlInput = document.getElementById('urlInput');
            if (urlInput.value) {
                // Just show the QR code, don't auto-download
                const qrcode = new QRCode(document.getElementById('qrcode'), {
                    text: urlInput.value,
                    width: 512,
                    height: 512,
                    colorDark: '#1C1A17',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        });
    </script>
</body>
</html>
